
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Writing Practice A2-B1</title>

<style>
body {
font-family: Arial, sans-serif;
background:#f4f6fb;
margin:0;
padding:0;
}

.container {
max-width:1000px;
margin:auto;
padding:30px;
}

.card {
background:white;
border-radius:14px;
padding:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:20px;
}

textarea {
width:100%;
height:260px;
padding:12px;
font-size:16px;
}

button {
padding:12px 18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover {
background:#1e4fd1;
}

.feedback {
background:#f0f6ff;
border-left:5px solid #2563eb;
padding:15px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>English Email Writing Practice (A2-B1)</h2>

<label>Naam student</label>
<input id="studentName">

<label>Email student</label>
<input id="studentEmail">

<button onclick="start()">Start</button>
</div>

<div id="exercise" class="card" style="display:none;">

<h3 id="title"></h3>
<p id="situation"></p>

<ul id="points"></ul>

<textarea id="text"></textarea>

<button onclick="checkEmail()">Check email</button>

<div id="feedback" class="feedback"></div>

</div>

</div>

<script>

const tasks = [
{
title:"Email to teacher about homework",
situation:"You were sick and could not finish your homework.",
points:["Explain sickness","Mention homework","Ask for one extra day","Apologise","Say when you will finish","End politely"]
},

{
title:"Email to hotel",
situation:"You want to stay in London.",
points:["Introduce yourself","Say dates","Ask price","Ask breakfast","Room for two","End politely"]
},

{
title:"Birthday invitation",
situation:"Invite a friend to your birthday.",
points:["Invite friend","Where party","Start time","Mention food","Ask reply","End politely"]
},

{
title:"Sports club information",
situation:"You want to join a sports club.",
points:["Introduce yourself","Mention sport","Ask schedule","Ask cost","Ask how to join","End politely"]
},

{
title:"Complaint about headphones",
situation:"You bought headphones that do not work.",
points:["Mention product","Explain problem","Purchase date","Ask replacement","Ask refund","End politely"]
},

{
title:"Volunteer at animal shelter",
situation:"You want to volunteer.",
points:["Introduce yourself","Say availability","Explain motivation","Ask volunteer tasks","Ask application process","End politely"]
}
]

let currentTask=null

function start(){
const r=Math.floor(Math.random()*tasks.length)
currentTask=tasks[r]

document.getElementById("exercise").style.display="block"
document.getElementById("title").innerText=currentTask.title
document.getElementById("situation").innerText=currentTask.situation

let html=""
currentTask.points.forEach(p=>html+="<li>"+p+"</li>")

document.getElementById("points").innerHTML=html
}

function checkGreeting(text){
if(text.match(/Dear\s+(Mr\.|Mrs\.|Sir|Madam|[A-Z][a-z]+)/))
return "Greeting looks correct."
else
return "Use a correct greeting: Dear Mr. Smith, Dear Mrs. Smith, or Dear Sir/Madam,"
}

function checkCapitalI(text){
if(text.match(/\bi\b/))
return "The word 'I' must always be written with a capital letter."
return "Capital I usage looks correct."
}

function checkSentenceCaps(text){
const sentences=text.split(/[.!?]/)
let errors=0
sentences.forEach(s=>{
let t=s.trim()
if(t.length>0 && t[0]===t[0].toLowerCase())
errors++
})

if(errors>0)
return "Some sentences do not start with a capital letter."
else
return "Sentence capitalization looks good."
}

function checkClosing(text){
if(text.match(/look forward to hearing from you/i))
return "Good closing sentence."
else
return "Add a closing sentence like: I look forward to hearing from you."
}

function checkSignature(text){
if(text.match(/kind regards|yours sincerely|yours faithfully/i))
return "Email sign-off looks correct."
else
return "Add a sign-off: Kind regards / Yours sincerely / Yours faithfully."
}

function checkPoints(text){
let count=0

currentTask.points.forEach(p=>{
let key=p.split(" ")[0].toLowerCase()
if(text.toLowerCase().includes(key)) count++
})

let ratio=count/currentTask.points.length

if(ratio>=0.8)
return "You covered enough task points."
else
return "Your email does not include enough of the required content points."
}

function checkEmail(){
const text=document.getElementById("text").value

let feedback=""

feedback+="<b>Greeting:</b> "+checkGreeting(text)+"<br><br>"
feedback+="<b>Capital I:</b> "+checkCapitalI(text)+"<br><br>"
feedback+="<b>Sentence capitals:</b> "+checkSentenceCaps(text)+"<br><br>"
feedback+="<b>Content coverage:</b> "+checkPoints(text)+"<br><br>"
feedback+="<b>Closing sentence:</b> "+checkClosing(text)+"<br><br>"
feedback+="<b>Sign-off:</b> "+checkSignature(text)+"<br><br>"

document.getElementById("feedback").innerHTML=feedback
}

</script>

</body>
</html>
